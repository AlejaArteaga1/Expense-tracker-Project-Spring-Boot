<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="form-card mx-auto">
        <h2 class="mb-4 text-center">Edit Expense</h2>

        <form th:action="@{/expenses/update/{id}(id=${expenseDto.id})}" th:object="${expenseDto}" method="post">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" th:field="*{title}" class="form-control">
                <small class="text-danger" th:errors="*{title}"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" th:field="*{description}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" th:field="*{amount}" class="form-control">
                <small class="text-danger" th:errors="*{amount}"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Expense Date</label>
                <input type="date" th:field="*{expenseDate}" class="form-control">
                <small class="text-danger" th:errors="*{expenseDate}"></small>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select th:field="*{categoryId}" class="form-select">
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                    </option>
                </select>
                <small class="text-danger" th:errors="*{categoryId}"></small>
            </div>

            <button type="submit" class="btn btn-primary w-100">Update Expense</button>
        </form>
    </div>
</div>

</body>
</html>
