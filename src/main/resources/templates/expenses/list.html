<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Expenses</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Expenses</h2>
        <a th:href="@{/expenses/new}" class="btn btn-primary">Add Expense</a>
    </div>

    <div th:if="${param.success}" class="alert alert-success">Expense added successfully.</div>
    <div th:if="${param.updated}" class="alert alert-success">Expense updated successfully.</div>
    <div th:if="${param.deleted}" class="alert alert-success">Expense deleted successfully.</div>

    <div class="content-card mb-4">
        <h4 class="mb-3">Search by Category</h4>
        <form th:action="@{/expenses/search}" method="get" class="row g-3">
            <div class="col-md-8">
                <select name="categoryId" class="form-select">
                    <option value="">Select a category</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}">
                    </option>
                </select>
            </div>
            <div class="col-md-4">
                <button class="btn btn-outline-primary w-100">Search</button>
            </div>
        </form>
    </div>

    <div class="content-card mb-4">
        <h4 class="mb-3">Search by Exact Date</h4>
        <form th:action="@{/expenses/search}" method="get" class="row g-3">
            <div class="col-md-8">
                <input type="date" name="expenseDate" class="form-control">
            </div>
            <div class="col-md-4">
                <button class="btn btn-outline-primary w-100">Search</button>
            </div>
        </form>
    </div>

    <div class="content-card mb-4">
        <h4 class="mb-3">Search by Date Range</h4>
        <form th:action="@{/expenses/search}" method="get" class="row g-3">
            <div class="col-md-5">
                <input type="date" name="startDate" class="form-control">
            </div>
            <div class="col-md-5">
                <input type="date" name="endDate" class="form-control">
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-primary w-100">Search</button>
            </div>
        </form>
    </div>

    <div class="content-card">
        <h4 class="mb-3">Expense Records</h4>
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="expense : ${expenses}">
                <td th:text="${expense.title}"></td>
                <td th:text="${expense.category.name}"></td>
                <td th:text="'$' + ${expense.amount}"></td>
                <td th:text="${expense.expenseDate}"></td>
                <td th:text="${expense.description}"></td>
                <td>
                    <a th:href="@{/expenses/edit/{id}(id=${expense.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/expenses/delete/{id}(id=${expense.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Are you sure you want to delete this expense?');">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
