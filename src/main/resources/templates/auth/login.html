<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="form-card mx-auto">
        <h2 class="mb-4 text-center">Login</h2>

        <div th:if="${param.error}" class="alert alert-danger">
            Invalid email or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out successfully.
        </div>

        <div th:if="${param.registered}" class="alert alert-success">
            Registration completed successfully. Please log in.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-center">
            Don’t have an account? <a th:href="@{/register}">Register here</a>
        </p>
    </div>
</div>

</body>
</html>
