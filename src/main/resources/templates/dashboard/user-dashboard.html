<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <h2 class="mb-4">User Dashboard</h2>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="dashboard-card">
                <h5>Monthly Total</h5>
                <h3 th:text="'$' + ${monthlyTotal}"></h3>
            </div>
        </div>
        <div class="col-md-6">
            <div class="dashboard-card">
                <h5>Total Expense Records</h5>
                <h3 th:text="${expenseCount}"></h3>
            </div>
        </div>
    </div>

    <div class="mb-4">
        <a th:href="@{/expenses/new}" class="btn btn-primary">Add New Expense</a>
        <a th:href="@{/expenses}" class="btn btn-outline-primary">Manage Expenses</a>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="content-card">
                <h4 class="mb-3">Spending by Category</h4>
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Category</th>
                        <th>Total</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${categoryTotals}">
                        <td th:text="${entry.key}"></td>
                        <td th:text="'$' + ${entry.value}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="content-card">
                <h4 class="mb-3">Recent Expenses</h4>
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Date</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="expense : ${expenses}">
                        <td th:text="${expense.title}"></td>
                        <td th:text="'$' + ${expense.amount}"></td>
                        <td th:text="${expense.expenseDate}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
