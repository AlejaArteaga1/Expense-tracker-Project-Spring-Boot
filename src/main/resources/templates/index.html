<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="hero-section">
    <div class="container text-center">
        <h1 class="display-5 fw-bold">Personal Expense Tracker</h1>
        <p class="lead mt-3">
            Track daily expenses, organize spending by category, and view monthly summaries in one secure platform.
        </p>
        <div class="mt-4">
            <a th:href="@{/register}" class="btn btn-primary btn-lg me-2">Get Started</a>
            <a th:href="@{/login}" class="btn btn-outline-light btn-lg">Login</a>
        </div>
    </div>
</section>

</body>
</html>
