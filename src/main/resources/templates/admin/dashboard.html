<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css}" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
  <h2 class="mb-4">Admin Dashboard</h2>

  <div class="row g-4">
    <div class="col-md-4">
      <div class="dashboard-card">
        <h5>Total Users</h5>
        <h3 th:text="${totalUsers}"></h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="dashboard-card">
        <h5>Total Expenses</h5>
        <h3 th:text="${totalExpenses}"></h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="dashboard-card">
        <h5>System Total Amount</h5>
        <h3 th:text="'$' + ${systemTotalAmount}"></h3>
      </div>
    </div>
  </div>
</div>

</body>
</html>
